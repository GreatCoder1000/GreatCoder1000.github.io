<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool view</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #050509;
    color: #f5f5f5;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .watch-view {
    text-align: center;
    padding: 24px 32px;
    border-radius: 24px;
    background: radial-gradient(circle at top, #202030, #050509);
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    min-width: 260px;
    max-width: 420px;
  }

  .watch-top {
    font-size: 0.85rem;
    opacity: 0.7;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .watch-main {
    font-size: 2.4rem;
    font-weight: 600;
    margin: 4px 0;
    line-height: 1.1;
  }

  .watch-bottom {
    font-size: 0.95rem;
    opacity: 0.8;
    margin-top: 8px;
  }

  .watch-list {
    margin-top: 18px;
    font-size: 0.85rem;
    opacity: 0.7;
  }

  .watch-list-item {
    margin: 2px 0;
  }
</style>
</head>
<body>

<div class="watch-view">
  <div class="watch-top">Featured</div>
  <div class="watch-main">GoogolSharp</div>
  <div class="watch-bottom">Symbolic large-number scaling library in C#</div>

  <div class="watch-list">
    <div class="watch-list-item">• Fast numbers demo</div>
    <div class="watch-list-item">• Large number experiments</div>
    <div class="watch-list-item">• Blog / notes</div>
  </div>
</div>

</body>
</html>
