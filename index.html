<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreatCoder1000</title>

<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #0d0d0d, #000);
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    /* Center logo */
    .logo {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;      /* makes it a circle */
      object-fit: cover;       /* crops the image inside the circle */
      animation: float 6s ease-in-out infinite;
  }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0px); }
    }

    /* Orbital container */
    .orbit {
        position: relative;
        width: 500px;
        height: 500px;
    }

    /* Floating link nodes */
    .link {
        position: absolute;
        padding: 10px 18px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        backdrop-filter: blur(4px);
        transition: 0.3s;
        text-decoration: none;
        color: white;
        font-size: 1.1rem;
    }

    .link:hover {
        background: rgba(255,255,255,0.25);
        transform: scale(1.1);
    }

    /* Orbital positions */
    .l1 { top: 0; left: 50%; transform: translateX(-50%); }
    .l2 { top: 50%; left: 0; transform: translateY(-50%); }
    .l3 { top: 50%; right: 0; transform: translateY(-50%); }
    .l4 { bottom: 0; left: 50%; transform: translateX(-50%); }

    /* Tablet adjustments */
    @media (max-width: 900px) {
        .orbit {
            width: 350px;
            height: 350px;
        }
        .logo {
            width: 140px;
            height: 140px;
        }
    }

    /* Mobile fallback */
    @media (max-width: 600px) {
        body {
            flex-direction: column;
            padding-top: 40px;
        }

        .orbit {
            display: none;
        }

        .logo {
            position: static;
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .mobile-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 80%;
        }

        .mobile-links a {
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            text-align: center;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .mobile-links a:hover {
            background: #222;
        }
    }
</style>
</head>

<body>

<img src="logo.png" class="logo" alt="Logo">

<div class="orbit">
    <a class="link l1" href="https://github.com/GreatCoder1000">GitHub</a>
    <a class="link l2" href="https://greatcoder1000.github.io/GoogolSharp">GoogolSharp</a>
    <a class="link l3" href="#">Coming soon!</a>
    <a class="link l4" href="#">Coming soon!</a>
</div>

<div class="mobile-links">
    <a href="https://github.com/GreatCoder1000">GitHub</a>
    <a href="https://greatcoder1000.github.io/GoogolSharp">GoogolSharp</a>
    <a href="#">Coming soon!</a>
    <a href="#">Coming soon!</a>
</div>

</body>
</html>
